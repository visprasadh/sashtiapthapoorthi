<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <linearGradient id="petalGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="45%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#9a7b1a"/>
    </linearGradient>
    <linearGradient id="petalMaroon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a83848"/>
      <stop offset="100%" stop-color="#6b1c2a"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a8f4a"/>
      <stop offset="100%" stop-color="#556b37"/>
    </linearGradient>
  </defs>

  <!-- Vine along top -->
  <path
    d="M4 18 C18 14 34 12 52 14 C62 15 68 13 74 10"
    stroke="#7a8f4a"
    stroke-width="1.4"
    stroke-linecap="round"
    opacity="0.85"
  />
  <!-- Vine along left -->
  <path
    d="M18 4 C14 18 12 34 14 52 C15 62 13 68 10 74"
    stroke="#7a8f4a"
    stroke-width="1.4"
    stroke-linecap="round"
    opacity="0.85"
  />

  <!-- Foliage clusters -->
  <path d="M28 10 C24 6 18 8 20 14 C22 18 28 16 28 10" fill="url(#leafGrad)" opacity="0.9"/>
  <path d="M10 28 C6 24 8 18 14 20 C18 22 16 28 10 28" fill="url(#leafGrad)" opacity="0.9"/>
  <path d="M42 8 C38 4 34 8 36 13 C38 16 43 14 42 8" fill="url(#leafGrad)" opacity="0.75"/>
  <path d="M8 42 C4 38 8 34 13 36 C16 38 14 43 8 42" fill="url(#leafGrad)" opacity="0.75"/>
  <path d="M56 12 C52 9 48 13 50 18 C52 21 57 18 56 12" fill="url(#leafGrad)" opacity="0.7"/>
  <path d="M12 56 C9 52 13 48 18 50 C21 52 18 57 12 56" fill="url(#leafGrad)" opacity="0.7"/>

  <!-- Leaf veins -->
  <path d="M22 12 L26 10 M12 22 L10 26" stroke="#9a7b1a" stroke-width="0.45" opacity="0.55"/>
  <path d="M38 10 L41 12 M10 38 L12 41" stroke="#9a7b1a" stroke-width="0.45" opacity="0.55"/>

  <!-- Main marigold — corner anchor -->
  <g transform="translate(8 8)">
    <ellipse cx="14" cy="16" rx="5" ry="8" fill="url(#petalGold)" transform="rotate(-18 14 16)"/>
    <ellipse cx="14" cy="16" rx="5" ry="8" fill="url(#petalGold)" transform="rotate(18 14 16)"/>
    <ellipse cx="14" cy="16" rx="5" ry="8" fill="url(#petalGold)" transform="rotate(54 14 16)"/>
    <ellipse cx="14" cy="16" rx="5" ry="8" fill="url(#petalGold)" transform="rotate(90 14 16)"/>
    <ellipse cx="14" cy="16" rx="5" ry="8" fill="url(#petalGold)" transform="rotate(126 14 16)"/>
    <ellipse cx="14" cy="16" rx="5" ry="8" fill="url(#petalGold)" transform="rotate(162 14 16)"/>
    <circle cx="14" cy="16" r="4.5" fill="url(#petalMaroon)"/>
    <circle cx="14" cy="16" r="2.2" fill="#4a0f1a"/>
  </g>

  <!-- Secondary lotus bud -->
  <g transform="translate(34 6)">
    <path d="M8 14 C8 6 14 2 18 8 C20 12 16 18 8 14" fill="url(#petalMaroon)" opacity="0.85"/>
    <path d="M8 14 C12 10 16 12 18 8 C16 16 10 18 8 14" fill="#8b3040" opacity="0.7"/>
    <path d="M8 14 C4 10 6 6 10 8 C12 10 10 14 8 14" fill="#8b3040" opacity="0.7"/>
  </g>

  <!-- Jasmine spray — left side -->
  <g transform="translate(4 34)">
    <circle cx="8" cy="8" r="3.2" fill="#faf6ee" stroke="#c9a227" stroke-width="0.7"/>
    <circle cx="8" cy="8" r="1.4" fill="#e8c96a"/>
    <circle cx="14" cy="14" r="2.4" fill="#faf6ee" stroke="#c9a227" stroke-width="0.6"/>
    <circle cx="14" cy="14" r="1" fill="#e8c96a"/>
    <circle cx="6" cy="18" r="2" fill="#faf6ee" stroke="#c9a227" stroke-width="0.55"/>
    <circle cx="6" cy="18" r="0.8" fill="#e8c96a"/>
  </g>

  <!-- Small marigold accent -->
  <g transform="translate(48 4)">
    <ellipse cx="6" cy="6" rx="3.2" ry="5" fill="url(#petalGold)" transform="rotate(0 6 6)"/>
    <ellipse cx="6" cy="6" rx="3.2" ry="5" fill="url(#petalGold)" transform="rotate(60 6 6)"/>
    <ellipse cx="6" cy="6" rx="3.2" ry="5" fill="url(#petalGold)" transform="rotate(120 6 6)"/>
    <circle cx="6" cy="6" r="2" fill="url(#petalMaroon)"/>
  </g>

  <!-- Accent bloom — lower left arm -->
  <g transform="translate(4 48)">
    <ellipse cx="6" cy="6" rx="3.2" ry="5" fill="url(#petalGold)" transform="rotate(20 6 6)"/>
    <ellipse cx="6" cy="6" rx="3.2" ry="5" fill="url(#petalGold)" transform="rotate(80 6 6)"/>
    <ellipse cx="6" cy="6" rx="3.2" ry="5" fill="url(#petalGold)" transform="rotate(140 6 6)"/>
    <circle cx="6" cy="6" r="2" fill="url(#petalMaroon)"/>
  </g>

  <!-- Delicate tendrils -->
  <path
    d="M20 6 C26 4 30 8 34 6 M6 20 C4 26 8 30 6 34"
    stroke="#9a7b1a"
    stroke-width="0.6"
    stroke-linecap="round"
    opacity="0.5"
  />
</svg>
